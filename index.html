<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toko Online Modern - Tokoku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #F8F9FA;
      --surface: #FFFFFF;
      --surface2: #F1F3F5;
      --text: #212529;
      --text-muted: #6C757D;
      --primary: #4F46E5;
      --primary-dark: #4338CA;
      --primary-light: #EEF2FF;
      --accent: #10B981;
      --border: rgba(0, 0, 0, 0.08);
      --radius: 12px;
      --radius-sm: 8px;
    }

    [data-theme="dark"] {
      --bg: #121214;
      --surface: #1A1A1E;
      --surface2: #26262B;
      --text: #F8F9FA;
      --text-muted: #ADB5BD;
      --primary: #6366F1;
      --primary-dark: #4F46E5;
      --primary-light: #1E1B4B;
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .cart-btn {
      background: var(--primary-light);
      color: var(--primary);
      border: none;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .cart-count {
      background: var(--primary);
      color: white;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 99px;
    }

    .theme-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
    }

    /* HERO SECTION */
    .hero {
      text-align: center;
      padding: 60px 24px 40px;
      max-width: 800px;
      margin: 0 auto;
    }

    .hero h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 16px;
    }

    /* MAIN CONTAINER & FILTER */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .filter-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 18px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: var(--primary);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* PRODUCT GRID */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 20px rgba(0,0,0,0.05);
    }

    .product-img {
      width: 100%;
      height: 220px;
      background: #E9ECEF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      user-select: none;
    }

    .product-info {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .product-category {
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    .product-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .product-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      margin-top: auto;
      margin-bottom: 16px;
    }

    .btn-add {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    .btn-add:hover {
      background: var(--primary-dark);
    }

    /* SIDEBAR KERANJANG */
    .cart-sidebar {
      position: fixed;
      top: 0;
      right: -400px;
      width: 100%;
      max-width: 400px;
      height: 100%;
      background: var(--surface);
      box-shadow: -10px 0 30px rgba(0,0,0,0.05);
      z-index: 200;
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
    }

    .cart-sidebar.open {
      right: 0;
    }

    .cart-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cart-header h2 {
      font-size: 18px;
      font-weight: 700;
    }

    .close-cart {
      background: transparent;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text);
    }

    .cart-items {
      padding: 24px;
      overflow-y: auto;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .cart-item {
      display: flex;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .cart-item-img {
      font-size: 24px;
      background: var(--surface2);
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
    }

    .cart-item-details {
      flex-grow: 1;
    }

    .cart-item-title {
      font-size: 14px;
      font-weight: 600;
    }

    .cart-item-price {
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
      margin-top: 2px;
    }

    .cart-item-qty {
      font-size: 12px;
      color: var(--text-muted);
    }

    .btn-remove {
      background: transparent;
      border: none;
      color: #EF4444;
      cursor: pointer;
      font-size: 13px;
    }

    .cart-footer {
      padding: 24px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .btn-checkout {
      background: #25D366;
      color: white;
      border: none;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-checkout:hover {
      background: #20BA5A;
    }

    .cart-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 150;
      display: none;
    }

    .cart-overlay.open {
      display: block;
    }

    footer {
      text-align: center;
      padding: 24px;
      color: var(--text-hint);
      font-size: 13px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    @media (max-width: 576px) {
      .hero h1 { font-size: 28px; }
      .product-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="#">Tokoku.</a>
  <div class="header-actions">
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    <button class="cart-btn" onclick="toggleCart(true)">
      🛒 Keranjang <span class="cart-count" id="cart-count">0</span>
    </button>
  </div>
</header>

<main>
  <section class="hero">
    <h1>Katalog Produk Eksklusif</h1>
    <p>Dapatkan barang impian berkualitas tinggi dengan jaminan pelayanan terbaik langsung sampai ke rumah Anda.</p>
  </section>

  <div class="filter-container">
    <button class="filter-btn active" onclick="filterCategory('all', this)">Semua</button>
    <button class="filter-btn" onclick="filterCategory('elektronik', this)">Elektronik</button>
    <button class="filter-btn" onclick="filterCategory('pakaian', this)">Pakaian</button>
    <button class="filter-btn" onclick="filterCategory('aksesoris', this)">Aksesoris</button>
  </div>

  <div class="product-grid" id="product-list"></div>
</main>

<div class="cart-overlay" id="cart-overlay" onclick="toggleCart(false)"></div>

<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header">
    <h2>Keranjang Belanja</h2>
    <button class="close-cart" onclick="toggleCart(false)">&times;</button>
  </div>
  <div class="cart-items" id="cart-items-container">
    </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total:</span>
      <span id="cart-total-price">Rp 0</span>
    </div>
    <button class="btn-checkout" onclick="checkoutWA()">
      Pesan via WhatsApp (WA) 💬
    </button>
  </div>
</div>

<footer>&copy; 2026 Tokoku. Seluruh Hak Cipta Dilindungi.</footer>

<script>
// ============ KONFIGURASI TOKO ONLINE ============
const NOMOR_WHATSAPP = "6281234567890"; // Ganti dengan nomor WhatsApp kamu (awali dengan 62)

// DATABASE DATA PRODUK (Bisa kamu tambah/ubah sesukamu)
const products = [
  { id: 1, category: "elektronik", title: "Wireless Headphones Pro", price: 750000, emoji: "🎧" },
  { id: 2, category: "elektronik", title: "Smartwatch Series X", price: 1200000, emoji: "⌚" },
  { id: 3, category: "pakaian", title: "Kaos Katun Premium Oversize", price: 149000, emoji: "👕" },
  { id: 4, category: "pakaian", title: "Jaket Bomber Waterproof", price: 350000, emoji: "🧥" },
  { id: 5, category: "aksesoris", title: "Kacamata Hitam Anti UV", price: 199000, emoji: "🕶️" },
  { id: 6, category: "aksesoris", title: "Tas Ransel Minimalis Laptop", price: 425000, emoji: "🎒" }
];

let cart = [];

// ============ ENGINE DARK MODE ============
function initTheme() {
  const savedTheme = localStorage.getItem('shop-theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
}
function toggleTheme() {
  const currentTheme = document.documentElement.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('shop-theme', newTheme);
}
initTheme();

// ============ RENDER PRODUK ============
function renderProducts(filter = 'all') {
  const grid = document.getElementById('product-list');
  grid.innerHTML = '';
  
  const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
  
  filtered.forEach(p => {
    grid.innerHTML += `
      <div class="product-card">
        <div class="product-img">${p.emoji}</div>
        <div class="product-info">
          <span class="product-category">${p.category}</span>
          <h3 class="product-title">${p.title}</h3>
          <div class="product-price">Rp ${p.price.toLocaleString('id-ID')}</div>
          <button class="btn-add" onclick="addToCart(${p.id})">Tambah Ke Keranjang</button>
        </div>
      </div>
    `;
  });
}

function filterCategory(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts(cat);
}

// ============ ENGINE KERANJANG BELANJA ============
function toggleCart(show) {
  document.getElementById('cart-sidebar').classList.toggle('open', show);
  document.getElementById('cart-overlay').classList.toggle('open', show);
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  const exist = cart.find(item => item.id === id);
  
  if (exist) {
    exist.qty += 1;
  } else {
    cart.push({ ...product, qty: 1 });
  }
  
  updateCartUI();
  toggleCart(true); // Buka keranjang otomatis saat tambah barang
}

function removeFromCart(id) {
  cart = cart.filter(item => item.id !== id);
  updateCartUI();
}

function updateCartUI() {
  // Hitung jumlah total item
  const totalQty = cart.reduce((acc, item) => acc + item.qty, 0);
  document.getElementById('cart-count').textContent = totalQty;
  
  // Render Item List
  const container = document.getElementById('cart-items-container');
  container.innerHTML = '';
  
  if (cart.length === 0) {
    container.innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:40px;">Keranjang Anda masih kosong.</p>';
  }
  
  let totalPrice = 0;
  cart.forEach(item => {
    const subtotal = item.price * item.qty;
    totalPrice += subtotal;
    
    container.innerHTML += `
      <div class="cart-item">
        <div class="cart-item-img">${item.emoji}</div>
        <div class="cart-item-details">
          <div class="cart-item-title">${item.title}</div>
          <div class="cart-item-price">Rp ${item.price.toLocaleString('id-ID')}</div>
          <div class="cart-item-qty">Jumlah: ${item.qty}</div>
        </div>
        <button class="btn-remove" onclick="removeFromCart(${item.id})">Hapus</button>
      </div>
    `;
  });
  
  document.getElementById('cart-total-price').textContent = `Rp ${totalPrice.toLocaleString('id-ID')}`;
}

// ============ INTEGRASI CHECKOUT WHATSAPP ============
function checkoutWA() {
  if (cart.length === 0) {
    alert("Keranjang belanja Anda kosong!");
    return;
  }
  
  let text = "Halo, saya ingin memesan produk berikut:\n\n";
  let total = 0;
  
  cart.forEach((item, index) => {
    const subtotal = item.price * item.qty;
    total += subtotal;
    text += `${index + 1}. *${item.title}* (${item.qty}x) -> Rp ${subtotal.toLocaleString('id-ID')}\n`;
  });
  
  text += `\n*Total Keseluruhan:* Rp ${total.toLocaleString('id-ID')}`;
  text += `\n\nMohon informasi detail pengiriman dan nomor rekening pembayarannya ya. Terima kasih!`;
  
  // Encode format teks agar aman di URL internet
  const urlEncodedText = encodeURIComponent(text);
  const waURL = `https://api.whatsapp.com/send?phone=${NOMOR_WHATSAPP}&text=${urlEncodedText}`;
  
  // Buka tab WhatsApp baru
  window.open(waURL, '_blank');
}

// Inisialisasi Produk saat web dimuat pertama kali
renderProducts();
</script>
</body>
</html>
