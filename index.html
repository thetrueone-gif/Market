<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tokoku - Ragam Produk Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #F9FAFB;
      --surface: #FFFFFF;
      --surface2: #F3F4F6;
      --text: #111827;
      --text-muted: #4B5563;
      --primary: #6366F1;
      --primary-dark: #4F46E5;
      --primary-light: #EEF2FF;
      --accent: #10B981;
      --accent-light: #D1FAE5;
      --accent-text: #065F46;
      --border: rgba(0, 0, 0, 0.06);
      --radius-lg: 20px;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 4px 20px -2px rgba(18, 18, 20, 0.04);
      --gradient: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
    }

    [data-theme="dark"] {
      --bg: #0B0F19;
      --surface: #151B2C;
      --surface2: #1E2640;
      --text: #F3F4F6;
      --text-muted: #9CA3AF;
      --primary: #818CF8;
      --primary-dark: #6366F1;
      --primary-light: #1E1B4B;
      --border: rgba(255, 255, 255, 0.05);
      --shadow: 0 4px 25px rgba(0, 0, 0, 0.3);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NAVIGATION BAR */
    header {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 76px;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background 0.3s;
    }

    [data-theme="dark"] header {
      background: rgba(21, 27, 44, 0.8);
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cart-btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: var(--radius);
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
      box-shadow: var(--shadow);
    }

    .cart-btn:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    .cart-count {
      background: var(--gradient);
      color: white;
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 99px;
      font-weight: 700;
    }

    .theme-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
      box-shadow: var(--shadow);
    }

    .theme-toggle:hover {
      transform: scale(1.05);
    }

    /* DYNAMIC HERO SECTION */
    .hero-wrapper {
      padding: 32px 24px;
      position: relative;
    }
    
    .hero {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.08) 0%, rgba(168, 85, 247, 0.08) 100%);
      border-radius: var(--radius-lg);
      padding: 60px 24px;
      text-align: center;
      max-width: 1150px;
      margin: 0 auto;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    
    .hero::before {
      content: '';
      position: absolute;
      top: -50px; left: -50px; width: 150px; height: 150px;
      background: var(--primary); opacity: 0.15; filter: blur(50px); border-radius: 50%;
    }

    .hero h1 {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 14px;
      line-height: 1.2;
      letter-spacing: -1px;
    }
    
    .hero h1 span {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 16px;
      max-width: 580px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* MAIN BODY & CATEGORY FILTERS */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 24px 80px;
    }

    .filter-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 24px 0 36px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 10px 22px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow);
    }

    .filter-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--gradient);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
    }

    /* CARDS PRODUCT GRID */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 28px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
      box-shadow: var(--shadow);
      position: relative;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 30px -10px rgba(18, 18, 20, 0.12);
    }
    
    /* BADGE TAGS */
    .product-badge {
      position: absolute;
      top: 14px;
      left: 14px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      color: #111827;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 700;
      z-index: 2;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      text-transform: uppercase;
    }
    
    .product-badge.sale { background: #FEE2E2; color: #991B1B; }
    .product-badge.hot { background: #FEF3C7; color: #92400E; }

    .product-img-wrapper {
      width: 100%;
      height: 240px;
      background: linear-gradient(180deg, var(--surface2) 0%, var(--surface) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .product-img {
      font-size: 64px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      user-select: none;
    }

    .product-card:hover .product-img {
      transform: scale(1.2) rotate(4deg);
    }

    .product-info {
      padding: 22px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .product-category {
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 6px;
      letter-spacing: 0.08em;
    }

    .product-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .product-price {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
      margin-top: auto;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .price-slashed {
      font-size: 14px;
      text-decoration: line-through;
      color: var(--text-muted);
      font-weight: 400;
    }

    .btn-add {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: var(--radius);
      font-family: inherit;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s ease;
    }

    .product-card:hover .btn-add {
      background: var(--gradient);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
    }

    /* SLIDE-OUT CART SIDEBAR */
    .cart-sidebar {
      position: fixed;
      top: 0;
      right: -440px;
      width: 100%;
      max-width: 440px;
      height: 100%;
      background: var(--surface);
      box-shadow: -15px 0 40px rgba(0,0,0,0.08);
      z-index: 200;
      transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }

    .cart-sidebar.open { right: 0; }

    .cart-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cart-header h2 { font-size: 20px; font-weight: 800; }

    .close-cart {
      background: var(--surface2); border: none; font-size: 20px; width: 36px; height: 36px;
      border-radius: 50%; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center;
    }

    .cart-items {
      padding: 24px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 18px;
    }

    .cart-item { display: flex; gap: 14px; align-items: center; background: var(--surface2); padding: 14px; border-radius: var(--radius); }

    .cart-item-img {
      font-size: 28px; background: var(--surface); width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); box-shadow: var(--shadow);
    }

    .cart-item-details { flex-grow: 1; }
    .cart-item-title { font-size: 14px; font-weight: 700; }
    .cart-item-price { font-size: 14px; color: var(--accent); font-weight: 700; margin-top: 2px; }
    
    .qty-controls {
      display: flex; align-items: center; gap: 8px; margin-top: 6px;
    }
    .qty-btn {
      width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .qty-num { font-size: 13px; font-weight: 600; min-width: 16px; text-align: center; }

    .btn-remove { background: transparent; border: none; color: #EF4444; cursor: pointer; font-size: 13px; font-weight: 600; padding: 4px; }

    .cart-footer { padding: 24px; border-top: 1px solid var(--border); background: var(--surface); }
    .cart-total { display: flex; justify-content: space-between; font-size: 18px; font-weight: 800; margin-bottom: 20px; }

    .btn-checkout {
      background: #25D366; color: white; border: none; padding: 14px; border-radius: var(--radius);
      font-family: inherit; font-weight: 700; font-size: 16px; cursor: pointer; width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3); transition: transform 0.2s;
    }
    .btn-checkout:hover { transform: translateY(-1px); background: #20BA5A; }

    .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 150; display: none; }
    .cart-overlay.open { display: block; }

    /* TOAST NOTIFICATION POPUP */
    .toast-container {
      position: fixed; bottom: 24px; left: 24px; z-index: 1000; display: flex; flex-direction: column; gap: 10px;
    }
    .toast {
      background: #111827; color: white; padding: 12px 20px; border-radius: var(--radius);
      font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2); animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    [data-theme="dark"] .toast { background: var(--primary-dark); }

    footer { text-align: center; padding: 32px 24px; color: var(--text-muted); font-size: 14px; font-weight: 500; border-top: 1px solid var(--border); background: var(--surface); }

    /* KEYFRAMES FOR ANIMATIONS */
    @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 640px) {
      .hero h1 { font-size: 30px; }
      .product-grid { grid-template-columns: 1fr; }
      .hero-wrapper { padding: 16px; }
      .hero { padding: 40px 16px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="#">Tokoku.</a>
  <div class="header-actions">
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    <button class="cart-btn" onclick="toggleCart(true)">
      🛒 <span class="cart-count" id="cart-count">0</span>
    </button>
  </div>
</header>
            
<div class="hero-wrapper">
  <section class="hero">
    <h1>Ragam Produk <span>Eksklusif</span> Menantimu</h1>
    <p>Temukan koleksi perlengkapan modern, pakaian esensial, dan aksesoris pilihan terbaik untuk menunjang produktivitas harianmu.</p>
  </section>
</div>

<main>
  <div class="filter-container">
    <button class="filter-btn active" onclick="filterCategory('all', this)">✨ Semua</button>
    <button class="filter-btn" onclick="filterCategory('elektronik', this)">🔌 Elektronik</button>
    <button class="filter-btn" onclick="filterCategory('pakaian', this)">👕 Pakaian</button>
    <button class="filter-btn" onclick="filterCategory('aksesoris', this)">🕶️ Aksesoris</button>
  </div>

  <div class="product-grid" id="product-list"></div>
</main>

<div class="cart-overlay" id="cart-overlay" onclick="toggleCart(false)"></div>

<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header">
    <h2>Keranjang Anda</h2>
    <button class="close-cart" onclick="toggleCart(false)">&times;</button>
  </div>
  <div class="cart-items" id="cart-items-container"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total Bayar:</span>
      <span id="cart-total-price">Rp 0</span>
    </div>
    <button class="btn-checkout" onclick="checkoutWA()">
      Kirim Pesanan ke WhatsApp 💬
    </button>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<footer>&copy; 2026 Tokoku Online · Didesain dengan penuh gaya ✨</footer>

<script>
// ============ SETTING KONFIGURASI WHATSAPP ============
const NOMOR_WHATSAPP = "6281234567890"; // Ganti nomor Anda di sini (awali dengan kode negara 62)

// DATABASE DUMMY PRODUK YANG SUDAH DIBERI DISKON DAN METADATA BADGE
const products = [
  { id: 1, category: "elektronik", title: "Wireless Headphones Pro", price: 750000, slash: 890000, emoji: "🎧", badge: "Diskon 15%", badgeClass: "sale" },
  { id: 2, category: "elektronik", title: "Smartwatch Series X", price: 1200000, slash: 0, emoji: "⌚", badge: "Terlaris", badgeClass: "hot" },
  { id: 3, category: "pakaian", title: "Kaos Katun Premium Oversize", price: 149000, slash: 199000, emoji: "👕", badge: "Sale", badgeClass: "sale" },
  { id: 4, category: "pakaian", title: "Jaket Bomber Waterproof", price: 350000, slash: 0, emoji: "🧥", badge: "", badgeClass: "" },
  { id: 5, category: "aksesoris", title: "Kacamata Hitam Anti UV", price: 199000, slash: 250000, emoji: "🕶️", badge: "Stok Tipis", badgeClass: "hot" },
  { id: 6, category: "aksesoris", title: "Tas Ransel Minimalis Laptop", price: 425000, slash: 0, emoji: "🎒", badge: "Baru", badgeClass: "" }
];

let cart = [];

// ============ REKAYASA GLOBAL THEME ============
function initTheme() {
  const saved = localStorage.getItem('shop-theme-v2') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('shop-theme-v2', next);
}
initTheme();

// ============ INJEKSI STRUKTUR PRODUK KEDALAM DOM ============
function renderProducts(filter = 'all') {
  const grid = document.getElementById('product-list');
  grid.innerHTML = '';
  const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
  
  filtered.forEach(p => {
    const badgeMarkup = p.badge ? `<div class="product-badge ${p.badgeClass}">${p.badge}</div>` : '';
    const slashMarkup = p.slash ? `<span class="price-slashed">Rp ${p.slash.toLocaleString('id-ID')}</span>` : '';
    
    grid.innerHTML += `
      <div class="product-card">
        ${badgeMarkup}
        <div class="product-img-wrapper">
          <div class="product-img">${p.emoji}</div>
        </div>
        <div class="product-info">
          <span class="product-category">${p.category}</span>
          <h3 class="product-title">${p.title}</h3>
          <div class="product-price">
            Rp ${p.price.toLocaleString('id-ID')}
            ${slashMarkup}
          </div>
          <button class="btn-add" onclick="addToCart(${p.id})">Tambah Barang</button>
        </div>
      </div>
    `;
  });
}

function filterCategory(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts(cat);
}

// ============ ARSITEKTUR SIDEBAR & NOTIFIKASI TOAST ============
function toggleCart(show) {
  document.getElementById('cart-sidebar').classList.toggle('open', show);
  document.getElementById('cart-overlay').classList.toggle('open', show);
}

function showToast(message) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `🛒 ${message}`;
  container.appendChild(toast);
  
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  const exist = cart.find(item => item.id === id);
  
  if (exist) {
    exist.qty += 1;
  } else {
    cart.push({ ...product, qty: 1 });
  }
  
  updateCartUI();
  showToast(`${product.title} ditambahkan ke keranjang!`);
}

function updateQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) {
    cart = cart.filter(i => i.id !== id);
  }
  updateCartUI();
}

function removeFromCart(id) {
  cart = cart.filter(item => item.id !== id);
  updateCartUI();
}

function updateCartUI() {
  const totalQty = cart.reduce((acc, item) => acc + item.qty, 0);
  document.getElementById('cart-count').textContent = totalQty;
  
  const container = document.getElementById('cart-items-container');
  container.innerHTML = '';
  
  if (cart.length === 0) {
    container.innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:40px; font-size:14px;">Keranjang kosong. Yuk belanja!</p>';
  }
  
  let totalPrice = 0;
  cart.forEach(item => {
    const subtotal = item.price * item.qty;
    totalPrice += subtotal;
    
    container.innerHTML += `
      <div class="cart-item">
        <div class="cart-item-img">${item.emoji}</div>
        <div class="cart-item-details">
          <div class="cart-item-title">${item.title}</div>
          <div class="cart-item-price">Rp ${item.price.toLocaleString('id-ID')}</div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
          </div>
        </div>
        <button class="btn-remove" onclick="removeFromCart(${item.id})">Hapus</button>
      </div>
    `;
  });
  
  document.getElementById('cart-total-price').textContent = `Rp ${totalPrice.toLocaleString('id-ID')}`;
}

// ============ ENGINE CHECKOUT INTEGRASI WA ============
function checkoutWA() {
  if (cart.length === 0) {
    alert("Keranjang belanja Anda masih kosong!");
    return;
  }
  
  let text = "Halo Admin Tokoku, saya berminat memesan produk ini:\n\n";
  let total = 0;
  
  cart.forEach((item, index) => {
    const subtotal = item.price * item.qty;
    total += subtotal;
    text += `${index + 1}. *${item.title}* (${item.qty}x) -> Rp ${subtotal.toLocaleString('id-ID')}\n`;
  });
  
  text += `\n*Total Tagihan:* Rp ${total.toLocaleString('id-ID')}`;
  text += `\n\nMohon petunjuk alamat pembayaran & pengirimannya ya min. Terima kasih!`;
  
  const urlEncodedText = encodeURIComponent(text);
  const waURL = `https://api.whatsapp.com/send?phone=${6281918411626}&text=${urlEncodedText}`;
  window.open(waURL, '_blank');
}

// Render data pertama kali saat halaman dimuat lengkap
renderProducts();
</script>
</body>
</html>
